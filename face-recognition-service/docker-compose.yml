version: '3.8'

services:
  face-recognition:
    build: .
    container_name: face-recognition-simple
    ports:
      - "8080:8080"
    volumes:
      - face-data:/app/face_data
    restart: unless-stopped
    environment:
      - FLASK_ENV=development
    networks:
      - intelligent-network

networks:
  intelligent-network:
    name: proyecto-intelligent_intelligent-network
    external: true

volumes:
  face-data:
    driver: local
