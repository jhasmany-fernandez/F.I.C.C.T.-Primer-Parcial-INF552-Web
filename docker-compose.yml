services:
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: intelligent-frontend
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_started
    restart: unless-stopped
    networks:
      - intelligent-network

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: intelligent-backend
    command: ["node", "--watch", "server.js"]
    volumes:
      - ./backend:/app/backend
      - ./frontend:/app/frontend
      - backend_node_modules:/app/backend/node_modules
    ports:
      - "8081:8081"
    environment:
      POSTGRES_DB: smart_access
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_HOST: db
      DB_HOST: db
      DB_PORT: 5432
      PORT: 8081
      DEBUG: "True"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - intelligent-network

  db:
    image: postgres:16-alpine
    container_name: intelligent-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: smart_access
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - intelligent-network

networks:
  intelligent-network:
    name: ficct-primer-parcial-inf552_intelligent-network

volumes:
  postgres_data:
  backend_node_modules:
